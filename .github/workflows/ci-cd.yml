name: CI/CD - Voikerchat

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  FLUTTER_VERSION: "3.44.3"

jobs:
  # Job 1: Flutter Analysis & Testing
  flutter-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test
      
      - name: Build web
        run: flutter build web --release

  # Job 2: Deploy to Vercel (web) — DISABLED
  # Vercel auto-deploys via GitHub integration when code is pushed to main
  # No need for manual amondnet/vercel-action step
  deploy-web:
    runs-on: ubuntu-latest
    needs: flutter-test
    if: false  # Disabled: Vercel auto-deployment is active
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build web
        run: flutter build web --release
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ github.token }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: build/web

  # Job 3: Notify on failure
  notify:
    runs-on: ubuntu-latest
    needs: [flutter-test]
    if: failure()
    
    steps:
      - name: Notify failure
        run: |
          echo "CI/CD pipeline failed"
          echo "Check: https://github.com/shibuyer-jp/voikerchat/actions"
