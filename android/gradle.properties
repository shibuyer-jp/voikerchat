org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# This newDsl flag was added by the Flutter template
# Opted out: AGP 9's new-DSL-only path breaks the Flutter 3.44.x gradle
# plugin (NullPointerException). false makes AGP expose the legacy DSL
# that the current Flutter plugin supports.
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
# Opted out: AGP 9 defaults to built-in Kotlin, which breaks the
# kotlin-android plugin applied by Flutter plugin deps (e.g. app_links).
# Paired with android.newDsl=false to behave like AGP 8.x.
android.builtInKotlin=false
